{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto py-8">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
        <div class="flex items-center gap-4 mb-6">
            <a href="{% url 'doctor_list' %}" class="text-gray-400 hover:text-blue-600 transition">←</a>
            <h2 class="text-3xl font-bold text-gray-800 text-center flex-1">{{ title }}</h2>
        </div>
        
        <form method="post" class="space-y-6">
            {% csrf_token %}
            
            {% for field in form %}
                <div class="flex flex-col">
                    <label class="text-sm font-semibold text-gray-600 mb-2 px-1">
                        {{ field.label }}
                    </label>
                    
                    {{ field }}
                    
                    {% if field.errors %}
                        {% for error in field.errors %}
                            <p class="text-red-500 text-xs mt-1 px-1">⚠️ {{ error }}</p>
                        {% endfor %}
                    {% endif %}
                </div>
            {% endfor %}
            
            <div class="pt-6 flex flex-col sm:flex-row gap-4">
                <button type="submit" class="flex-1 bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 shadow-lg shadow-blue-200 transition-all active:scale-95">
                    Зберегти лікаря
                </button>
                <a href="{% url 'doctor_list' %}" class="flex-1 bg-gray-100 text-gray-600 font-bold py-3 rounded-xl hover:bg-gray-200 transition-all text-center flex items-center justify-center">
                    Скасувати
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
