{% extends 'base.html' %}

{% block content %}
<h2 class="text-3xl font-bold text-gray-800 mb-8 text-center">Наші спеціалісти</h2>

<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    {% for d in doctors %}
    <div class="group bg-white border border-gray-100 rounded-2xl p-6 shadow-sm hover:shadow-xl hover:border-blue-200 transition-all duration-300">
        <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center text-2xl mb-4 group-hover:scale-110 transition">
            👨‍⚕️
        </div>
        <h3 class="text-xl font-bold text-gray-800 mb-1">{{ d.full_name }}</h3>
        <p class="text-blue-600 font-medium text-sm mb-4">{{ d.specialization }}</p>
        
        <div class="flex items-center justify-between border-t pt-4 mt-4">
            <span class="text-xs text-gray-400 uppercase font-bold tracking-tighter">Стаж роботи</span>
            <span class="bg-gray-100 px-3 py-1 rounded text-sm font-bold text-gray-700">{{ d.experience }} років</span>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
