{% extends 'base.html' %}

{% block content %}
<div class="flex flex-col items-center justify-center py-12">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden">
        
        <div class="bg-blue-600 p-8 text-center">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-white rounded-full mb-4 shadow-inner text-3xl">
                🔐
            </div>
            <h2 class="text-2xl font-bold text-white">Вхід у систему</h2>
            <p class="text-blue-100 text-sm mt-2">Доступ тільки для медичного персоналу</p>
        </div>

        <form method="post" class="p-8 space-y-6">
            {% csrf_token %}
            
            {% if form.errors %}
                <div class="bg-red-50 border-l-4 border-red-500 p-4 mb-4">
                    <p class="text-sm text-red-700 font-medium">Невірне ім'я користувача або пароль. Спробуйте ще раз.</p>
                </div>
            {% endif %}

            <div>
                <label for="id_username" class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Логін</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">👤</span>
                    <input type="text" name="username" id="id_username" required
                           class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition duration-200"
                           placeholder="Введіть ваш логін">
                </div>
            </div>

            <div>
                <label for="id_password" class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Пароль</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">🔑</span>
                    <input type="password" name="password" id="id_password" required
                           class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition duration-200"
                           placeholder="••••••••">
                </div>
            </div>

            <button type="submit" 
                    class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold text-lg hover:bg-blue-700 transform hover:-translate-y-0.5 transition-all duration-200 shadow-lg active:scale-95">
                Увійти
            </button>
        </form>

        <div class="bg-gray-50 p-4 border-t border-gray-100 text-center">
            <p class="text-xs text-gray-500">Забули пароль? Зверніться до системного адміністратора</p>
        </div>
    </div>

    <a href="/" class="mt-8 text-sm text-gray-400 hover:text-blue-600 transition flex items-center gap-2">
        ← На головну
    </a>
</div>
{% endblock %}
