<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <nav class="bg-blue-600 text-white shadow-lg">
        <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold flex items-center gap-2">
                <span>🏥</span> Hospital System
            </h1>
            <div class="space-x-6 font-medium">
                <a href="/appointments/" class="hover:text-blue-200 transition">Записи</a>
                <a href="/doctors/" class="hover:text-blue-200 transition">Лікарі</a>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 py-8">
        <div class="bg-white rounded-xl shadow-md p-6 md:p-10">
            {% block content %}
            {% endblock %}
        </div>
    </main>

    <footer class="text-center py-6 text-gray-400 text-sm">
        &copy; 2026 Hospital Management System
    </footer>

</body>
</html>
