<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <nav class="bg-blue-600 text-white shadow-lg">
        <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold flex items-center gap-2">
                <span>🏥</span> Hospital System
            </h1>
            <div class="space-x-4">
                <a href="{% url 'appointment_list' %}">Записи</a>
                <a href="{% url 'doctor_list' %}">Лікарі</a>
                
                {% if user.is_authenticated %}
                    <a href="{% url 'appointment_create' %}" class="bg-white text-blue-600 px-3 py-1 rounded shadow text-sm font-bold">+ Додати</a>
                    <form action="{% url 'logout' %}" method="post" class="inline">
                        {% csrf_token %}
                        <button type="submit" class="text-blue-200 text-sm">Вийти ({{ user.username }})</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}" class="text-white border border-white px-3 py-1 rounded text-sm">Увійти</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 py-8">
        <div class="bg-white rounded-xl shadow-md p-6 md:p-10">
            {% block content %}
            {% endblock %}
        </div>
    </main>

    <footer class="text-center py-6 text-gray-400 text-sm">
        &copy; 2026 Hospital Management System
    </footer>

</body>
</html>
